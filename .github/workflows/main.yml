name: Test
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.lock'
  workflow_dispatch:

jobs:
  testing:
    strategy:
      matrix:
        python-version: ['3.11.15', '3.12.13', '3.13.14', '3.14.6']
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: install mise with Python ${{ matrix.python-version }}
        uses: jdx/mise-action@v4
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        with:
          version: 2026.6.14
          install: true
          cache: true

      - name: install testing dependencies
        run: |
          mise run project:sync --group test

      - name: run tests suite with coverage
        run: |
          mise run typecheck
          mise run test:cover

      - name: store coverage file
        if: ${{ matrix.os == 'ubuntu-latest' }} && ${{ matrix.python-version == '3.14' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          include-hidden-files: true

      - name: minimize uv cache
        run: uv cache prune --ci

  coverage:
    needs: [testing]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      actions: read

    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: gets coverage db
        uses: actions/download-artifact@v4
        id: download
        with:
          pattern: coverage
          merge-multiple: false
          path: artifacts

      - name: verify artifacts
        run: |
          echo "Artifacts dir listing (if present):"
          ls -la artifacts || true
          echo "Coverage files found under artifacts:"
          find artifacts -type f -name "coverage.xml" -print || true

      - name: move coverage files to repository root
        run: |
          find artifacts -type f -name "coverage.xml" -exec mv -t . {} +
        shell: bash

      - name: Coverage Badge
        run: |
          pip install -U 'genbadge[coverage]'
          genbadge coverage -i  coverage.xml -o coverage.svg

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v20
        id: verify-changed-files
        with:
          files: coverage.svg

      - name: Commit coverage.svg
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add coverage.svg
          git commit -m "Updated coverage.svg"

      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.github_token }}
          branch: ${{ github.head_ref || github.ref_name }}
