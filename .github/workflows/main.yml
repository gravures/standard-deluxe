name: Test
on:
  pull_request:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.lock'
  workflow_dispatch:

jobs:
  testing:
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: install mise with Python ${{ matrix.python-version }}
        uses: jdx/mise-action@v4
        with:
          version: 2026.6.14
          install: true
          cache: true
          tool_versions: python ${{ matrix.python-version }}

      - name: install testing dependencies
        run: |
          mise run project:sync --group test

      - name: run tests suite with coverage
        env:
          COVERAGE_FILE: ".coverage.${{ matrix.python-version }}.${{ matrix.os }}"
        run: |
          mise run typecheck
          mise run test:cover

      - name: store coverage file
        if: ${{ matrix.os }} == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ matrix.os }}
          path: .coverage.${{ matrix.python-version }}.${{ matrix.os }}

      - name: minimize uv cache
        run: uv cache prune --ci

  coverage:
    needs: [testing]
    runs-on: ubuntu-latest
    permissions:
      # Gives the action the necessary permissions
      # for publishing new comments in pull requests.
      pull-requests: write
      # Gives the action the necessary permissions for pushing data to the
      # python-coverage-comment-action branch, and for editing existing
      # comments (to avoid publishing multiple comments in the same PR)
      contents: write
      actions: read

    steps:
      - name: checkout repo
        uses: actions/checkout@v4

      - name: gets coverage db
        uses: actions/download-artifact@v4
        id: download
        with:
          pattern: coverage-*-*
          merge-multiple: true

      - name: inspect downloaded artifacts
        run: |
          echo "Artifact directories (if any):"
          ls -la ./coverage-* || true
          echo "Coverage files found:"
          find . -type f -name ".coverage.*" -print || true

      - name: move coverage files to repository root
        run: |
          files_found=$(find . -type f -name ".coverage.*" -print -quit)
          if [ -z "$files_found" ]; then
            echo "No coverage files found after download-artifact. Listing full workspace for debugging:"
            ls -R .
            exit 1
          fi
          find . -type f -name ".coverage.*" -exec mv -t . {} +
        shell: bash

      - name: create coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERAGE_DATA_BRANCH: python-coverage
          COMMENT_ARTIFACT_NAME: python-coverage
          COMMENT_FILENAME: python-coverage.txt
          MERGE_COVERAGE_FILES: true

      - name: store pull request comment to be posted
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage
          path: python-coverage.txt
